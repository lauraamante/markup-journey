<!--html/js - Buscador de CEP -->
<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            background-color: #fceef7;
            font-family: "Segoe UI", Arial;
            display: flex;
            justify-content: center;
            padding-top: 40px;
        }

        .card {
            background: white;
            padding: 30px;
            width: 320px;
            border-radius: 16px;
            box-shadow: 0 6px 16px rgba(0,0,0,0.1);
            text-align: center;
            border: 2px solid #f7cde5;
        }

        h2 {
            color: #d86fa3;
            margin-bottom: 20px;
        }

        input {
            width: 90%;
            padding: 12px;
            border: 1px solid #e6bcd3;
            border-radius: 8px;
            margin-top: 10px;
            background-color: #fff7fb;
        }

        input:focus {
            outline: none;
            border-color: #d86fa3;
            box-shadow: 0 0 5px #f3a8cf;
        }

        button {
            margin-top: 18px;
            padding: 12px;
            width: 100%;
            background: #e88abc;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #d870a9;
        }

        .resultado {
            margin-top: 15px;
            text-align: left;
            font-size: 14px;
            color: #444;
        }
    </style>
</head>
<body>
    
    <div class="card">
        <h2>Buscar CEP</h2>

        <input id="cep" placeholder="Digite o CEP">
        <button onclick="buscarCEP()">Buscar</button>

        <div class="resultado" id="resultado"></div>
    </div>

    <script>
        async function buscarCEP() {
            const cep = document.getElementById("cep").value;
            const resultado = document.getElementById("resultado");

            if (cep.length < 8) {
                resultado.innerHTML = "CEP inválido.";
                return;
            }

            const url = `https://viacep.com.br/ws/${cep}/json/`;

            const resposta = await fetch(url);
            const dados = await resposta.json();

            if (dados.erro) {
                resultado.innerHTML = "CEP não encontrado.";
                return;
            }

            resultado.innerHTML = `
                <strong>Logradouro:</strong> ${dados.logradouro}<br>
                <strong>Bairro:</strong> ${dados.bairro}<br>
                <strong>Cidade:</strong> ${dados.localidade}<br>
                <strong>Estado:</strong> ${dados.uf}<br>
            `;
        }
    </script>

</body>
</html>
